<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0306</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:sans-serif;
}

img{
width:90%;
max-width:400px;
border-radius:20px;
}

button{
margin-top:25px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:15px;
background:#ff2d55;
color:white;
cursor:pointer;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
}
</style>
</head>

<body>

<img src="photo.jpg">

<button onclick="playVideo()">영상 보기</button>

<video id="video" src="0306.mp4"></video>

<script>

function playVideo(){
let v = document.getElementById("video");

v.style.display="block";
v.play();

if(v.requestFullscreen){
v.requestFullscreen();
}

}

</script>

</body>
</html>
